# >>> tmux-window-bookmarks >>>
bind s display-message -d 8000 "bookmarks: 1-0 jump | n/p cycle | a add | l list | ? help" \; switch-client -T tmux-window-bookmarks
bind -n M-S-PPage run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-prev.sh"
bind -n M-S-NPage run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-next.sh"
bind -n M-p run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-prev.sh"
bind -n M-n run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-next.sh"

bind -T tmux-window-bookmarks 1 run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-go.sh 1"
bind -T tmux-window-bookmarks 2 run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-go.sh 2"
bind -T tmux-window-bookmarks 3 run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-go.sh 3"
bind -T tmux-window-bookmarks 4 run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-go.sh 4"
bind -T tmux-window-bookmarks 5 run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-go.sh 5"
bind -T tmux-window-bookmarks 6 run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-go.sh 6"
bind -T tmux-window-bookmarks 7 run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-go.sh 7"
bind -T tmux-window-bookmarks 8 run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-go.sh 8"
bind -T tmux-window-bookmarks 9 run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-go.sh 9"
bind -T tmux-window-bookmarks 0 run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-go.sh 10"

bind -T tmux-window-bookmarks a run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-add.sh"
bind -T tmux-window-bookmarks A command-prompt -p "assign to slot (1-10)" { run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-assign.sh %%" }
bind -T tmux-window-bookmarks d command-prompt -p "delete slot (1-10)" { run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-delete.sh %%" }
bind -T tmux-window-bookmarks m command-prompt -p "move from:to (e.g. 5:2)" { run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-move.sh %%" }
bind -T tmux-window-bookmarks n run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-next.sh"
bind -T tmux-window-bookmarks p run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-prev.sh"
bind -T tmux-window-bookmarks l run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-list.sh"
bind -T tmux-window-bookmarks s run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-show.sh"
bind -T tmux-window-bookmarks ? display-message -d 8000 "bookmarks: 1-0 jump | n next | p prev | a add | A assign | d delete | m move | l list | s show | c clear"
bind -T tmux-window-bookmarks c confirm-before -p "clear all bookmark slots? (y/n)" { run-shell -b "$HOME/.tmux/plugins/tmux-window-bookmarks/scripts/bookmark-clear.sh" }
bind -T tmux-window-bookmarks Escape switch-client -T root
# <<< tmux-window-bookmarks <<<
