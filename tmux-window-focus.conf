# >>> tmux-window-focus >>>
bind s switch-client -T tmux-window-focus

bind -T tmux-window-focus 1 run-shell -b "$HOME/.tmux/plugins/tmux-window-focus/scripts/focus-go.sh 1"
bind -T tmux-window-focus 2 run-shell -b "$HOME/.tmux/plugins/tmux-window-focus/scripts/focus-go.sh 2"
bind -T tmux-window-focus 3 run-shell -b "$HOME/.tmux/plugins/tmux-window-focus/scripts/focus-go.sh 3"
bind -T tmux-window-focus 4 run-shell -b "$HOME/.tmux/plugins/tmux-window-focus/scripts/focus-go.sh 4"
bind -T tmux-window-focus 5 run-shell -b "$HOME/.tmux/plugins/tmux-window-focus/scripts/focus-go.sh 5"
bind -T tmux-window-focus 6 run-shell -b "$HOME/.tmux/plugins/tmux-window-focus/scripts/focus-go.sh 6"
bind -T tmux-window-focus 7 run-shell -b "$HOME/.tmux/plugins/tmux-window-focus/scripts/focus-go.sh 7"
bind -T tmux-window-focus 8 run-shell -b "$HOME/.tmux/plugins/tmux-window-focus/scripts/focus-go.sh 8"
bind -T tmux-window-focus 9 run-shell -b "$HOME/.tmux/plugins/tmux-window-focus/scripts/focus-go.sh 9"
bind -T tmux-window-focus 0 run-shell -b "$HOME/.tmux/plugins/tmux-window-focus/scripts/focus-go.sh 10"

bind -T tmux-window-focus a run-shell -b "$HOME/.tmux/plugins/tmux-window-focus/scripts/focus-add.sh"
bind -T tmux-window-focus A command-prompt -p "assign to slot (1-10)" { run-shell -b "$HOME/.tmux/plugins/tmux-window-focus/scripts/focus-assign.sh %%" }
bind -T tmux-window-focus d command-prompt -p "delete slot (1-10)" { run-shell -b "$HOME/.tmux/plugins/tmux-window-focus/scripts/focus-delete.sh %%" }
bind -T tmux-window-focus m command-prompt -p "move from:to (e.g. 5:2)" { run-shell -b "$HOME/.tmux/plugins/tmux-window-focus/scripts/focus-move.sh %%" }
bind -T tmux-window-focus l run-shell -b "$HOME/.tmux/plugins/tmux-window-focus/scripts/focus-list.sh"
bind -T tmux-window-focus s run-shell -b "$HOME/.tmux/plugins/tmux-window-focus/scripts/focus-show.sh"
bind -T tmux-window-focus c confirm-before -p "clear all focus slots? (y/n)" { run-shell -b "$HOME/.tmux/plugins/tmux-window-focus/scripts/focus-clear.sh" }
bind -T tmux-window-focus Escape switch-client -T root
# <<< tmux-window-focus <<<
